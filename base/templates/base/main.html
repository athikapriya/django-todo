<!DOCTYPE html>
{% load static %}
<html lang="en-US">
<head>
    <!-- =============== meta tags =============== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=7">
    <meta name="description" content="Stay organized with this Todo App. Add, edit, delete, and track your daily tasks with a clean and easy-to-use interface.">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="keywords" content="Html, Css, Bootstrap, Python, Django, Sqlite">
    <meta name="author" content="Athika Chowdhury Priya">

    <!-- =============== title tag =============== -->
    <title>Todo App</title>

    <!-- =============== google fonts =============== -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

    <!-- =============== font awesome cdn =============== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!-- =============== bootstrap css cdn =============== -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!-- =============== global css =============== -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">

    <!-- =============== individual css =============== -->
    {% block css %} {% endblock %}
</head>
<body>


    <main>

        <section class="d-flex align-items-center justify-content-center vh-100">
            <div class="d-flex justify-content-center flex-column " style="height:100%;">
                {% block content %}

                {% endblock %}
            </div>
        </section>

    </main>
    


    <!-- =============== bootstrap js cdn =============== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- =============== global script =============== -->
    <script src="{% static 'js/main.js' %}"></script>

    <!-- =============== individual script =============== -->
    {% block script %}  {% endblock %}
</body>
</html>
